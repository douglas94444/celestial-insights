name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SKIP_AUTH_E2E: "1"
      CI: "true"
      # Mesmo projecto que em src/integrations/supabase/public-config.ts (chave publishable, não secret)
      VITE_SUPABASE_URL: https://fxcoxnqqjgvqfukasfjb.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4Y294bnFxamd2cWZ1a2FzZmpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzODc5OTUsImV4cCI6MjA5Mzk2Mzk5NX0.PaG0jrPfZQPxmysHZAZ8ZA1WWrYabLywvzrLmOiACFI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps
      - name: E2E (public smoke)
        run: npx playwright test
